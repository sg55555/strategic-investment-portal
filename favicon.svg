<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark background with rounded corners -->
  <rect width="32" height="32" rx="5" fill="#0b0f1a"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="5" fill="none" stroke="#1e293b" stroke-width="1"/>

  <!-- Candlestick bars -->
  <!-- Bar 1 (bearish / red) -->
  <line x1="8" y1="7" x2="8" y2="10" stroke="#ef4444" stroke-width="1.2"/>
  <rect x="5.5" y="10" width="5" height="7" rx="0.5" fill="#ef4444"/>
  <line x1="8" y1="17" x2="8" y2="21" stroke="#ef4444" stroke-width="1.2"/>

  <!-- Bar 2 (bullish / green) -->
  <line x1="16" y1="6" x2="16" y2="9" stroke="#22c55e" stroke-width="1.2"/>
  <rect x="13.5" y="9" width="5" height="9" rx="0.5" fill="#22c55e"/>
  <line x1="16" y1="18" x2="16" y2="23" stroke="#22c55e" stroke-width="1.2"/>

  <!-- Bar 3 (bullish / green) -->
  <line x1="24" y1="8" x2="24" y2="11" stroke="#22c55e" stroke-width="1.2"/>
  <rect x="21.5" y="11" width="5" height="6" rx="0.5" fill="#22c55e"/>
  <line x1="24" y1="17" x2="24" y2="19" stroke="#22c55e" stroke-width="1.2"/>

  <!-- Bottom label: SIP in indigo -->
  <text x="16" y="30" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="6" fill="#6366f1" letter-spacing="1">SIP</text>
</svg>
