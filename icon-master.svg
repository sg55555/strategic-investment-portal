<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#070c16"/>
      <stop offset=".5" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#0e1422"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset=".5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="gR" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4.5"/></filter>
    <filter id="gB" x="-90%" y="-90%" width="280%" height="280%"><feGaussianBlur stdDeviation="8"/></filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="24"/></filter>
    <clipPath id="round"><rect width="512" height="512" rx="112"/></clipPath>
    <clipPath id="disc"><circle cx="256" cy="256" r="150"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>
    <ellipse cx="256" cy="220" rx="190" ry="160" fill="#4f46e5" opacity=".2" filter="url(#soft)"/>
    <!-- HUD ring -->
    <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="10" opacity=".4" filter="url(#gB)"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="5"/>
    <circle cx="256" cy="256" r="168" fill="none" stroke="url(#ring)" stroke-width="2" stroke-dasharray="3 14" opacity=".55"/>
    <!-- inside disc: grid + chart -->
    <g clip-path="url(#disc)">
      <g stroke="#6366f1" stroke-opacity=".12" stroke-width="2">
        <line x1="106" y1="216" x2="406" y2="216"/><line x1="106" y1="256" x2="406" y2="256"/><line x1="106" y1="296" x2="406" y2="296"/>
      </g>
      <!-- trend line -->
      <polyline points="140,318 196,292 252,302 308,242 372,196" fill="none" stroke="url(#ring)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#gB)" opacity=".5"/>
      <polyline points="140,318 196,292 252,302 308,242 372,196" fill="none" stroke="url(#ring)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- candlesticks -->
      <g filter="url(#gR)">
        <line x1="170" y1="278" x2="170" y2="342" stroke="#00f573" stroke-width="4.5"/><rect x="158" y="296" width="24" height="36" rx="3" fill="#00f573"/>
        <line x1="240" y1="282" x2="240" y2="346" stroke="#ff003d" stroke-width="4.5"/><rect x="228" y="298" width="24" height="38" rx="3" fill="#ff003d"/>
        <line x1="310" y1="226" x2="310" y2="300" stroke="#ff003d" stroke-width="4.5"/><rect x="298" y="242" width="24" height="44" rx="3" fill="#ff003d"/>
      </g>
    </g>
    <!-- peak node on ring -->
    <circle cx="372" cy="196" r="10" fill="#e0e7ff" filter="url(#gB)"/>
    <circle cx="372" cy="196" r="7" fill="#e0e7ff"/>
  </g>
</svg>
